<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم مكتبة روضة الطالب</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Tajawal', sans-serif; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
  .spinner {
    border: 3px solid #e2e8f0;
    border-top: 3px solid #0d9488;
    border-radius: 50%;
    width: 24px; height: 24px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal-backdrop { background: rgba(15, 23, 42, 0.55); }
  .toast { animation: slideUp 0.3s ease both; }
  @keyframes slideUp { from { opacity:0; transform: translateY(12px);} to {opacity:1; transform: translateY(0);} }
</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<!-- ===== شاشة تسجيل الدخول ===== -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="bg-teal-50 rounded-2xl p-4 inline-block mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
        </svg>
      </div>
      <h1 class="font-extrabold text-xl text-slate-800">لوحة تحكم المكتبة</h1>
      <p class="text-sm text-slate-500 mt-1">مكتبة روضة الطالب</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="text-sm font-bold text-slate-600 block mb-1">البريد الإلكتروني</label>
        <input id="loginEmail" type="email" required class="w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none focus:ring-2 focus:ring-teal-300" placeholder="example@gmail.com" />
      </div>
      <div>
        <label class="text-sm font-bold text-slate-600 block mb-1">كلمة المرور</label>
        <input id="loginPassword" type="password" required class="w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none focus:ring-2 focus:ring-teal-300" placeholder="••••••••" />
      </div>
      <p id="loginError" class="hidden text-red-600 text-sm bg-red-50 rounded-lg p-2.5"></p>
      <button type="submit" id="loginBtn" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-2.5 rounded-xl transition flex items-center justify-center gap-2">
        <span id="loginBtnText">تسجيل الدخول</span>
        <div id="loginSpinner" class="spinner hidden"></div>
      </button>
    </form>
  </div>
</div>

<!-- ===== لوحة التحكم (بعد الدخول) ===== -->
<div id="dashboard" class="hidden min-h-screen">
  <header class="bg-gradient-to-l from-teal-700 to-teal-600 sticky top-0 z-30 shadow-lg">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="text-white">
        <h1 class="font-extrabold text-lg leading-tight">لوحة تحكم المكتبة</h1>
        <p class="text-teal-100 text-[11px]" id="userEmailLabel"></p>
      </div>
      <button id="logoutBtn" class="text-white text-sm bg-white/15 hover:bg-white/25 px-4 py-2 rounded-lg transition">تسجيل الخروج</button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto p-4">

    <!-- إحصائيات -->
    <div class="grid grid-cols-2 gap-3 mb-5">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
        <p class="text-slate-500 text-xs">إجمالي الكتب</p>
        <p id="totalBooksStat" class="font-extrabold text-2xl text-teal-700">—</p>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
        <p class="text-slate-500 text-xs">أغلفة مضافة من اللوحة</p>
        <p id="coversStat" class="font-extrabold text-2xl text-teal-700">—</p>
      </div>
    </div>

    <!-- زر إضافة + بحث -->
    <div class="flex gap-2 mb-4">
      <div class="flex-1 relative">
        <input id="searchBooksInput" type="text" placeholder="ابحث للتعديل أو الحذف..."
          class="w-full rounded-xl py-2.5 px-4 pr-10 text-sm bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-teal-300" />
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400 absolute right-3.5 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 10.5a6.5 6.5 0 11-13 0 6.5 6.5 0 0113 0z" />
        </svg>
      </div>
      <button id="openAddModalBtn" class="bg-teal-600 hover:bg-teal-700 text-white font-bold px-4 rounded-xl transition shrink-0 flex items-center gap-1.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        إضافة
      </button>
    </div>

    <div id="loadingBooks" class="flex justify-center py-10"><div class="spinner"></div></div>

    <!-- قائمة الكتب -->
    <div id="booksListWrap" class="hidden bg-white rounded-2xl shadow-sm border border-slate-100 divide-y divide-slate-100"></div>
    <p id="noSearchResults" class="hidden text-center text-slate-400 py-10 text-sm">لا يوجد كتاب مطابق</p>
    <div class="flex justify-center py-5">
      <button id="loadMoreAdminBtn" class="hidden bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-6 py-2.5 rounded-full transition text-sm">
        عرض المزيد من الكتب
      </button>
    </div>
  </main>
</div>

<!-- ===== نافذة إضافة/تعديل كتاب ===== -->
<div id="bookModal" class="hidden fixed inset-0 z-50 modal-backdrop flex items-end sm:items-center justify-center">
  <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full sm:max-w-md max-h-[92vh] overflow-y-auto">
    <div class="sticky top-0 bg-white border-b border-slate-100 px-5 py-4 flex items-center justify-between">
      <h2 id="modalTitle" class="font-extrabold text-lg text-slate-800">إضافة كتاب جديد</h2>
      <button id="closeModalBtn" class="text-slate-400 hover:text-red-500 p-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <form id="bookForm" class="p-5 space-y-4">
      <input type="hidden" id="bookDocId" />

      <div>
        <label class="text-sm font-bold text-slate-600 block mb-1">صورة الغلاف (اختياري)</label>
        <div class="flex items-center gap-3">
          <div id="coverPreviewWrap" class="w-20 h-28 rounded-lg bg-slate-100 border border-slate-200 flex items-center justify-center overflow-hidden shrink-0">
            <span class="text-slate-300 text-xs">لا صورة</span>
          </div>
          <div class="flex-1">
            <input id="coverInput" type="file" accept="image/*" class="hidden" />
            <button type="button" id="chooseCoverBtn" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold px-4 py-2 rounded-lg transition">اختيار صورة</button>
            <button type="button" id="removeCoverBtn" class="hidden text-red-500 text-xs font-bold mt-2 block">إزالة الصورة</button>
          </div>
        </div>
      </div>

      <div>
        <label class="text-sm font-bold text-slate-600 block mb-1">عنوان الكتاب *</label>
        <input id="bookTitle" required class="w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none focus:ring-2 focus:ring-teal-300" />
      </div>
      <div>
        <label class="text-sm font-bold text-slate-600 block mb-1">المؤلف</label>
        <input id="bookAuthor" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none focus:ring-2 focus:ring-teal-300" />
      </div>
      <div>
        <label class="text-sm font-bold text-slate-600 block mb-1">دار النشر</label>
        <input id="bookPublisher" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none focus:ring-2 focus:ring-teal-300" />
      </div>
      <div>
        <label class="text-sm font-bold text-slate-600 block mb-1">السعر (دج) *</label>
        <input id="bookPrice" type="number" required min="0" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none focus:ring-2 focus:ring-teal-300" />
      </div>

      <p id="formError" class="hidden text-red-600 text-sm bg-red-50 rounded-lg p-2.5"></p>

      <div class="flex gap-2 pt-2">
        <button type="submit" id="saveBookBtn" class="flex-1 bg-teal-600 hover:bg-teal-700 text-white font-bold py-2.5 rounded-xl transition flex items-center justify-center gap-2">
          <span id="saveBookBtnText">حفظ</span>
          <div id="saveBookSpinner" class="spinner hidden"></div>
        </button>
        <button type="button" id="deleteBookBtn" class="hidden bg-red-50 hover:bg-red-100 text-red-600 font-bold px-4 rounded-xl transition">حذف</button>
      </div>
    </form>
  </div>
</div>

<!-- ===== رسالة تأكيد عائمة ===== -->
<div id="toast" class="hidden fixed bottom-5 right-1/2 translate-x-1/2 bg-slate-800 text-white text-sm font-bold px-5 py-3 rounded-full shadow-xl z-50 toast"></div>

<!-- ===== نافذة تأكيد الحذف ===== -->
<div id="confirmDeleteModal" class="hidden fixed inset-0 z-[60] modal-backdrop flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl w-full max-w-xs p-5 text-center">
    <p class="font-bold text-slate-800 mb-1">حذف الكتاب؟</p>
    <p class="text-sm text-slate-500 mb-4">لا يمكن التراجع عن هذا الإجراء</p>
    <div class="flex gap-2">
      <button id="cancelDeleteBtn" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 rounded-xl transition">إلغاء</button>
      <button id="confirmDeleteBtn" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-2 rounded-xl transition">حذف نهائياً</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc, setDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ============ إعدادات Firebase ============ */
const firebaseConfig = {
  apiKey: "AIzaSyD8ymp9TFSI1cy9j0v3UXEc6bSLcOlhqPk",
  authDomain: "raoudat-al-talib.firebaseapp.com",
  projectId: "raoudat-al-talib",
  storageBucket: "raoudat-al-talib.firebasestorage.app",
  messagingSenderId: "704849358324",
  appId: "1:704849358324:web:b0a14c905b865726c8dda1",
  measurementId: "G-GQSLJHVHRW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ============ عناصر DOM ============ */
const loginScreen = document.getElementById('loginScreen');
const dashboard = document.getElementById('dashboard');
const loginForm = document.getElementById('loginForm');
const loginEmail = document.getElementById('loginEmail');
const loginPassword = document.getElementById('loginPassword');
const loginError = document.getElementById('loginError');
const loginBtn = document.getElementById('loginBtn');
const loginBtnText = document.getElementById('loginBtnText');
const loginSpinner = document.getElementById('loginSpinner');
const logoutBtn = document.getElementById('logoutBtn');
const userEmailLabel = document.getElementById('userEmailLabel');

const totalBooksStat = document.getElementById('totalBooksStat');
const coversStat = document.getElementById('coversStat');
const searchBooksInput = document.getElementById('searchBooksInput');
const openAddModalBtn = document.getElementById('openAddModalBtn');
const loadingBooks = document.getElementById('loadingBooks');
const booksListWrap = document.getElementById('booksListWrap');
const noSearchResults = document.getElementById('noSearchResults');
const loadMoreAdminBtn = document.getElementById('loadMoreAdminBtn');

const bookModal = document.getElementById('bookModal');
const modalTitle = document.getElementById('modalTitle');
const closeModalBtn = document.getElementById('closeModalBtn');
const bookForm = document.getElementById('bookForm');
const bookDocId = document.getElementById('bookDocId');
const bookTitle = document.getElementById('bookTitle');
const bookAuthor = document.getElementById('bookAuthor');
const bookPublisher = document.getElementById('bookPublisher');
const bookPrice = document.getElementById('bookPrice');
const formError = document.getElementById('formError');
const saveBookBtn = document.getElementById('saveBookBtn');
const saveBookBtnText = document.getElementById('saveBookBtnText');
const saveBookSpinner = document.getElementById('saveBookSpinner');
const deleteBookBtn = document.getElementById('deleteBookBtn');

const coverInput = document.getElementById('coverInput');
const chooseCoverBtn = document.getElementById('chooseCoverBtn');
const removeCoverBtn = document.getElementById('removeCoverBtn');
const coverPreviewWrap = document.getElementById('coverPreviewWrap');

const toast = document.getElementById('toast');
const confirmDeleteModal = document.getElementById('confirmDeleteModal');
const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

/* ============ حالة عامة ============ */
let allBooks = [];       // كل الكتب المحمّلة من Firestore
let currentCoverBase64 = null; // الصورة المُختارة حالياً في النموذج
let bookIdPendingDelete = null;

/* ============ تسجيل الدخول ============ */
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  loginError.classList.add('hidden');
  loginBtnText.classList.add('hidden');
  loginSpinner.classList.remove('hidden');
  loginBtn.disabled = true;

  try {
    await signInWithEmailAndPassword(auth, loginEmail.value.trim(), loginPassword.value);
  } catch (err) {
    let msg = "حدث خطأ، تأكد من البريد وكلمة المرور";
    if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
      msg = "البريد الإلكتروني أو كلمة المرور غير صحيحة";
    } else if (err.code === 'auth/invalid-email') {
      msg = "صيغة البريد الإلكتروني غير صحيحة";
    } else if (err.code === 'auth/too-many-requests') {
      msg = "محاولات كثيرة جداً، حاول لاحقاً";
    }
    loginError.textContent = msg;
    loginError.classList.remove('hidden');
  } finally {
    loginBtnText.classList.remove('hidden');
    loginSpinner.classList.add('hidden');
    loginBtn.disabled = false;
  }
});

logoutBtn.addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, (user) => {
  if (user) {
    loginScreen.classList.add('hidden');
    dashboard.classList.remove('hidden');
    userEmailLabel.textContent = user.email;
    loadAllBooks();
  } else {
    dashboard.classList.add('hidden');
    loginScreen.classList.remove('hidden');
  }
});

/* ============ حالة عرض القائمة (لتفادي تحميل 1683 صفاً دفعة واحدة) ============ */
const ADMIN_PAGE_SIZE = 50;
let currentListSource = [];  // القائمة الحالية (كل الكتب أو نتيجة بحث)
let currentRenderedCount = 0;

function showBooksPage(list, append = false) {
  if (!append) {
    currentListSource = list;
    currentRenderedCount = 0;
    booksListWrap.innerHTML = "";
  }

  if (currentListSource.length === 0) {
    noSearchResults.classList.remove('hidden');
    booksListWrap.classList.add('hidden');
    loadMoreAdminBtn.classList.add('hidden');
    return;
  }
  noSearchResults.classList.add('hidden');
  booksListWrap.classList.remove('hidden');

  const nextSlice = currentListSource.slice(currentRenderedCount, currentRenderedCount + ADMIN_PAGE_SIZE);
  renderBooksList(nextSlice, true);
  currentRenderedCount += nextSlice.length;

  loadMoreAdminBtn.classList.toggle('hidden', currentRenderedCount >= currentListSource.length);
}

loadMoreAdminBtn.addEventListener('click', () => showBooksPage(null, true));

/* ============ تحميل كل الكتب ============ */
async function loadAllBooks() {
  loadingBooks.classList.remove('hidden');
  booksListWrap.classList.add('hidden');

  const snapshot = await getDocs(collection(db, 'books'));
  allBooks = [];
  snapshot.forEach(docSnap => {
    allBooks.push({ docId: docSnap.id, ...docSnap.data() });
  });
  allBooks.sort((a, b) => (a.id || 0) - (b.id || 0));

  totalBooksStat.textContent = allBooks.length.toLocaleString('ar');
  coversStat.textContent = allBooks.filter(b => b.coverBase64).length.toLocaleString('ar');

  loadingBooks.classList.add('hidden');
  booksListWrap.classList.remove('hidden');
  showBooksPage(allBooks);
}

function renderBooksList(list, append = false) {
  if (!append) booksListWrap.innerHTML = "";

  const fragment = document.createDocumentFragment();
  list.forEach(book => {
    const row = document.createElement('button');
    row.type = "button";
    row.className = "w-full text-right px-4 py-3 flex items-center gap-3 hover:bg-slate-50 transition";
    row.innerHTML = `
      <div class="w-10 h-14 rounded bg-slate-100 shrink-0 overflow-hidden flex items-center justify-center">
        <img src="${book.coverBase64 ? book.coverBase64 : book.id + '.jpg'}" class="w-full h-full object-cover"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
        <span class="text-slate-300 text-[10px]" style="display:none;">—</span>
      </div>
      <div class="flex-1 min-w-0">
        <p class="font-bold text-sm text-slate-800 truncate">${escapeHtml(book.title || '')}</p>
        <p class="text-xs text-slate-500 truncate">${escapeHtml(book.author || '')} · ${(book.price || 0).toLocaleString('ar')} دج</p>
      </div>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
      </svg>
    `;
    row.addEventListener('click', () => openEditModal(book));
    fragment.appendChild(row);
  });
  booksListWrap.appendChild(fragment);
}

let searchDebounce;
searchBooksInput.addEventListener('input', (e) => {
  clearTimeout(searchDebounce);
  const q = e.target.value.trim().toLowerCase();
  searchDebounce = setTimeout(() => {
    const filtered = q
      ? allBooks.filter(b => (b.title || '').toLowerCase().includes(q) || (b.author || '').toLowerCase().includes(q))
      : allBooks;
    showBooksPage(filtered);
  }, 200);
});

/* ============ فتح نافذة الإضافة ============ */
openAddModalBtn.addEventListener('click', () => {
  modalTitle.textContent = "إضافة كتاب جديد";
  bookForm.reset();
  bookDocId.value = "";
  currentCoverBase64 = null;
  resetCoverPreview();
  deleteBookBtn.classList.add('hidden');
  formError.classList.add('hidden');
  bookModal.classList.remove('hidden');
});

/* ============ فتح نافذة التعديل ============ */
function openEditModal(book) {
  modalTitle.textContent = "تعديل الكتاب";
  bookDocId.value = book.docId;
  bookTitle.value = book.title || "";
  bookAuthor.value = book.author || "";
  bookPublisher.value = book.publisher || "";
  bookPrice.value = book.price || "";
  currentCoverBase64 = book.coverBase64 || null;

  if (currentCoverBase64) {
    coverPreviewWrap.innerHTML = `<img src="${currentCoverBase64}" class="w-full h-full object-cover" />`;
    removeCoverBtn.classList.remove('hidden');
  } else {
    // محاولة عرض غلاف قديم مرفوع على GitHub بنفس رقم الكتاب (إن وُجد)
    coverPreviewWrap.innerHTML = `
      <img src="${book.id}.jpg" class="w-full h-full object-cover"
           onerror="this.parentElement.innerHTML = '<span class=&quot;text-slate-300 text-xs&quot;>لا صورة</span>';" />`;
    removeCoverBtn.classList.add('hidden');
  }

  deleteBookBtn.classList.remove('hidden');
  formError.classList.add('hidden');
  bookModal.classList.remove('hidden');
}

closeModalBtn.addEventListener('click', () => bookModal.classList.add('hidden'));

function resetCoverPreview() {
  coverPreviewWrap.innerHTML = `<span class="text-slate-300 text-xs">لا صورة</span>`;
  removeCoverBtn.classList.add('hidden');
}

/* ============ اختيار وضغط صورة الغلاف ============ */
chooseCoverBtn.addEventListener('click', () => coverInput.click());

coverInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (evt) => {
    const img = new Image();
    img.onload = () => {
      const MAX_W = 450;
      const scale = Math.min(1, MAX_W / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      currentCoverBase64 = canvas.toDataURL('image/jpeg', 0.72);
      coverPreviewWrap.innerHTML = `<img src="${currentCoverBase64}" class="w-full h-full object-cover" />`;
      removeCoverBtn.classList.remove('hidden');
    };
    img.src = evt.target.result;
  };
  reader.readAsDataURL(file);
});

removeCoverBtn.addEventListener('click', () => {
  currentCoverBase64 = null;
  coverInput.value = "";
  resetCoverPreview();
});

/* ============ حفظ (إضافة أو تعديل) ============ */
bookForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  formError.classList.add('hidden');
  saveBookBtnText.classList.add('hidden');
  saveBookSpinner.classList.remove('hidden');
  saveBookBtn.disabled = true;

  try {
    const isEdit = !!bookDocId.value;
    let idNum;
    let docIdStr;

    if (isEdit) {
      docIdStr = bookDocId.value;
      const existing = allBooks.find(b => b.docId === docIdStr);
      idNum = existing ? existing.id : parseInt(docIdStr, 10);
    } else {
      const maxId = allBooks.reduce((max, b) => Math.max(max, b.id || 0), 0);
      idNum = maxId + 1;
      docIdStr = String(idNum);
    }

    const data = {
      id: idNum,
      title: bookTitle.value.trim(),
      author: bookAuthor.value.trim() || "غير محدد",
      publisher: bookPublisher.value.trim() || "أخرى",
      price: parseInt(bookPrice.value, 10) || 0,
    };
    if (currentCoverBase64) {
      data.coverBase64 = currentCoverBase64;
    }

    await setDoc(doc(db, 'books', docIdStr), data, { merge: false });

    bookModal.classList.add('hidden');
    showToast(isEdit ? "تم تحديث الكتاب ✅" : "تمت إضافة الكتاب ✅");
    await loadAllBooks();
  } catch (err) {
    formError.textContent = "حدث خطأ أثناء الحفظ: " + err.message;
    formError.classList.remove('hidden');
  } finally {
    saveBookBtnText.classList.remove('hidden');
    saveBookSpinner.classList.add('hidden');
    saveBookBtn.disabled = false;
  }
});

/* ============ الحذف ============ */
deleteBookBtn.addEventListener('click', () => {
  bookIdPendingDelete = bookDocId.value;
  confirmDeleteModal.classList.remove('hidden');
});

cancelDeleteBtn.addEventListener('click', () => {
  confirmDeleteModal.classList.add('hidden');
  bookIdPendingDelete = null;
});

confirmDeleteBtn.addEventListener('click', async () => {
  if (!bookIdPendingDelete) return;
  try {
    await deleteDoc(doc(db, 'books', bookIdPendingDelete));
    confirmDeleteModal.classList.add('hidden');
    bookModal.classList.add('hidden');
    showToast("تم حذف الكتاب 🗑️");
    await loadAllBooks();
  } catch (err) {
    showToast("فشل الحذف: " + err.message);
  }
  bookIdPendingDelete = null;
});

/* ============ أدوات مساعدة ============ */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? "";
  return div.innerHTML;
}

let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.add('hidden'), 2500);
}
</script>
</body>
</html>
