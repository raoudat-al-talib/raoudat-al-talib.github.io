name: توليد صفحات الكتب لجوجل

on:
  schedule:
    - cron: '0 3,15 * * *'   # يعمل تلقائياً مرتين يومياً (الساعة 3 و15 بتوقيت UTC)
  workflow_dispatch: {}       # يتيح التشغيل اليدوي بضغطة زر من تبويب Actions

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate book pages + sitemap
        run: node scripts/generate-pages.js

      - name: Commit and push if changed
        run: |
          git config user.name "auto-seo-bot"
          git config user.email "actions@github.com"
          git add book/ sitemap.xml
          git diff --staged --quiet || git commit -m "تحديث تلقائي لصفحات الكتب وخريطة الموقع"
          git push
