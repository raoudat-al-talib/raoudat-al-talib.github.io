<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ============ إعدادات Firebase (مفتاح عام آمن) ============ */
const firebaseConfig = {
  apiKey: "AIzaSyD8ymp9TFSI1cy9j0v3UXEc6bSLcOlhqPk",
  authDomain: "raoudat-al-talib.firebaseapp.com",
  projectId: "raoudat-al-talib",
  storageBucket: "raoudat-al-talib.firebasestorage.app",
  messagingSenderId: "704849358324",
  appId: "1:704849358324:web:b0a14c905b865726c8dda1",
  measurementId: "G-GQSLJHVHRW"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

/* ============ بيانات الكتب (تُجلب حياً من قاعدة البيانات) ============ */
let BOOKS = [];

/* ============ إعدادات عامة ============ */
const WHATSAPP_NUMBER = "213770664417"; // رقم واتساب المكتبة
const PAGE_SIZE = 30; // عدد الكتب المعروضة في كل دفعة (لتحسين الأداء)

let filteredBooks = [];
let renderedCount = 0;
let activeCategory = null;
let categoryMode = "topic"; // topic | author | publisher
let searchQuery = "";

/* ============ تصنيف الكتب حسب الموضوع (تلقائياً من العنوان) ============ */
const TOPIC_RULES = [
  { name: "التفسير وعلوم القرآن", keywords: ["تفسير", "القرآن", "آيات", "التجويد", "القراءات", "أسباب النزول", "الوقف والابتداء"] },
  { name: "العقيدة والتوحيد", keywords: ["عقيدة", "العقيدة", "التوحيد", "الإيمان", "الأسماء والصفات", "الإبانة", "الواسطية", "الطحاوية", "الفرق", "البدع", "الولاء والبراء"] },
  { name: "الحديث وشروحه", keywords: ["حديث", "الحديث", "بلوغ المرام", "صحيح", "سنن", "مسند", "الأربعين", "رياض الصالحين", "اللؤلؤ", "الجامع الصحيح", "مصطلح الحديث"] },
  { name: "الفقه وأصوله", keywords: ["فقه", "الفقه", "فتاوى", "الفتاوى", "الطهارة", "الصلاة", "الزكاة", "الصيام", "الحج", "المعاملات", "النكاح", "الطلاق", "البيوع", "أصول الفقه", "القواعد الفقهية"] },
  { name: "السيرة النبوية والصحابة", keywords: ["السيرة", "سيرة", "الرسول", "النبي", "الصحابة", "غزوة", "غزوات", "الخلفاء الراشدين"] },
  { name: "التاريخ والتراجم", keywords: ["تاريخ", "التاريخ", "الدولة", "الخلافة", "تراجم", "طبقات", "وفيات"] },
  { name: "الرقائق والتزكية والأخلاق", keywords: ["التزكية", "الأخلاق", "الآداب", "السلوك", "الرقائق", "القلوب", "الزهد", "الورع"] },
  { name: "الأذكار والأدعية", keywords: ["الأذكار", "الأدعية", "الحصن الحصين", "الدعاء", "حصن المسلم"] },
  { name: "التربية والتعليم", keywords: ["التربية", "تربية الأبناء", "المنهج", "التعليم", "الطالب", "المعلم"] },
  { name: "اللغة العربية والنحو", keywords: ["النحو", "الصرف", "البلاغة", "اللغة العربية", "الإعراب", "الأدب", "العروض", "الشعر"] },
  { name: "الفرق والرد على المخالفين", keywords: ["الرد على", "مناظرة", "شبهات", "المذاهب الفكرية"] },
  { name: "متون وحفظ", keywords: ["متن", "منظومة", "الحفظ الميسر", "المتون"] },
  { name: "قصص وأطفال", keywords: ["قصص الأطفال", "للأطفال", "قصص", "حكايات"] },
  { name: "التنمية الذاتية وعام", keywords: ["حياتي", "النجاح", "التنمية", "الإدارة", "المهارات"] },
];

function classifyTopic(title) {
  for (const rule of TOPIC_RULES) {
    for (const kw of rule.keywords) {
      if (title.includes(kw)) return rule.name;
    }
  }
  return "كتب عامة ومتنوعة";
}

/* ============ عناصر DOM ============ */
const grid = document.getElementById('grid');
const searchInput = document.getElementById('searchInput');
const categoryList = document.getElementById('categoryList');
const categorySearch = document.getElementById('categorySearch');
const resultsCount = document.getElementById('resultsCount');
const loadMoreBtn = document.getElementById('loadMoreBtn');
const loadingSpinner = document.getElementById('loadingSpinner');
const noResults = document.getElementById('noResults');
const activeCategoryChip = document.getElementById('activeCategoryChip');
const activeCategoryLabel = document.getElementById('activeCategoryLabel');
const clearCategoryBtn = document.getElementById('clearCategoryBtn');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const openSidebarBtn = document.getElementById('openSidebarBtn');
const closeSidebarBtn = document.getElementById('closeSidebarBtn');

/* ============ بناء قوائم التصنيفات الثلاث (نوع / مؤلف / دار نشر) ============ */
function buildCategories(field) {
  const counts = {};
  BOOKS.forEach(b => {
    counts[b[field]] = (counts[b[field]] || 0) + 1;
  });
  return Object.entries(counts).sort((a, b) => b[1] - a[1]);
}
let CATEGORY_SETS = { topic: [], author: [], publisher: [] };
const CATEGORY_FIELD = { topic: 'topic', author: 'author', publisher: 'publisher' };

function renderCategories(filterText = "") {
  categoryList.innerHTML = "";

  // زر "كل الكتب"
  const allBtn = document.createElement('button');
  allBtn.className = `w-full text-right px-3 py-2 rounded-lg text-sm font-bold flex justify-between items-center transition
    ${!activeCategory ? 'active-cat' : 'hover:bg-slate-100 text-slate-700'}`;
  allBtn.innerHTML = `<span>📚 كل الكتب</span><span class="text-xs opacity-75">${BOOKS.length}</span>`;
  allBtn.onclick = () => selectCategory(null);
  categoryList.appendChild(allBtn);

  const divider = document.createElement('div');
  divider.className = "border-t my-2";
  categoryList.appendChild(divider);

  const currentSet = CATEGORY_SETS[categoryMode];
  const q = filterText.trim().toLowerCase();
  const filtered = q ? currentSet.filter(([name]) => name.toLowerCase().includes(q)) : currentSet;

  if (filtered.length === 0) {
    const empty = document.createElement('p');
    empty.className = "text-center text-slate-400 text-sm py-4";
    empty.textContent = "لا يوجد تصنيف مطابق";
    categoryList.appendChild(empty);
    return;
  }

  filtered.forEach(([name, count]) => {
    const btn = document.createElement('button');
    btn.className = `w-full text-right px-3 py-2 rounded-lg text-sm flex justify-between items-center transition
      ${activeCategory === name ? 'active-cat' : 'hover:bg-slate-100 text-slate-600'}`;
    btn.innerHTML = `<span class="line-clamp-2">${escapeHtml(name)}</span><span class="text-xs opacity-75 shrink-0 mr-2">${count}</span>`;
    btn.onclick = () => selectCategory(name);
    categoryList.appendChild(btn);
  });
}

function selectCategory(name) {
  activeCategory = name;
  renderCategories(categorySearch.value);
  applyFilters();
  closeSidebar();
}

function switchCategoryMode(mode) {
  categoryMode = mode;
  activeCategory = null;
  document.querySelectorAll('.cat-mode-btn').forEach(btn => {
    btn.classList.toggle('active-mode', btn.dataset.mode === mode);
  });
  categorySearch.value = "";
  renderCategories();
  applyFilters();
}
document.querySelectorAll('.cat-mode-btn').forEach(btn => {
  btn.addEventListener('click', () => switchCategoryMode(btn.dataset.mode));
});

/* ============ فلترة البحث ============ */
function applyFilters() {
  const q = searchQuery.trim().toLowerCase();

  const field = CATEGORY_FIELD[categoryMode];
  filteredBooks = BOOKS.filter(b => {
    const matchesCategory = !activeCategory || b[field] === activeCategory;
    if (!matchesCategory) return false;
    if (!q) return true;
    return b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q);
  });

  // تحديث شريحة التصنيف النشط
  if (activeCategory) {
    activeCategoryChip.classList.remove('hidden');
    activeCategoryChip.classList.add('flex');
    activeCategoryLabel.textContent = activeCategory;
  } else {
    activeCategoryChip.classList.add('hidden');
    activeCategoryChip.classList.remove('flex');
  }

  renderedCount = 0;
  grid.innerHTML = "";
  renderNextBatch();
}

/* ============ عرض الكتب على دفعات (لتفادي إبطاء المتصفح) ============ */
function renderNextBatch() {
  const total = filteredBooks.length;
  resultsCount.textContent = `${total.toLocaleString('ar')} كتاب`;

  if (total === 0) {
    noResults.classList.remove('hidden');
    loadMoreBtn.classList.add('hidden');
    return;
  }
  noResults.classList.add('hidden');

  const nextSlice = filteredBooks.slice(renderedCount, renderedCount + PAGE_SIZE);
  const fragment = document.createDocumentFragment();

  nextSlice.forEach(book => {
    fragment.appendChild(createBookCard(book));
  });

  grid.appendChild(fragment);
  renderedCount += nextSlice.length;

  loadMoreBtn.classList.toggle('hidden', renderedCount >= total);
}

/* ============ إنشاء بطاقة كتاب ============ */
function createBookCard(book) {
  const card = document.createElement('div');
  card.className = "book-card bg-white rounded-2xl shadow-sm hover:shadow-lg border border-slate-100 flex flex-col p-3.5 transition";

  const priceFormatted = book.price.toLocaleString('ar');
  const waMessage = encodeURIComponent(`أريد طلب كتاب: ${book.title} بسعر ${book.price} دج`);
  const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${waMessage}`;

  const coverSrc = book.coverBase64 ? book.coverBase64 : `${book.id}.jpg`;

  card.innerHTML = `
    <div class="flex-1">
      <div class="w-full aspect-[3/4] bg-gradient-to-br from-teal-50 to-teal-100 rounded-xl flex items-center justify-center mb-3 border border-teal-100 overflow-hidden relative">
        <img src="${coverSrc}" alt="${escapeHtml(book.title)}" loading="lazy"
             class="absolute inset-0 w-full h-full object-cover"
             onerror="this.parentElement.innerHTML = document.getElementById('defaultCoverIcon').innerHTML;" />
      </div>
      <h3 class="font-bold text-sm text-slate-800 line-clamp-2 leading-snug" title="${escapeHtml(book.title)}">${escapeHtml(book.title)}</h3>
      <p class="text-xs text-slate-500 mt-1 line-clamp-1">${escapeHtml(book.author)}</p>
      <p class="text-[11px] text-teal-600 mt-0.5 line-clamp-1">${escapeHtml(book.publisher)}</p>
    </div>
    <div class="mt-3 pt-3 border-t border-slate-100">
      <p class="font-extrabold text-teal-700 mb-2">${priceFormatted} <span class="text-xs font-medium text-slate-500">دج</span></p>
      <a href="${waLink}" target="_blank" rel="noopener"
         class="flex items-center justify-center gap-1.5 bg-green-500 hover:bg-green-600 text-white text-xs font-bold py-2 rounded-lg transition w-full">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="h-4 w-4 fill-white">
          <path d="M16.004 3C9.373 3 4 8.373 4 15c0 2.386.7 4.61 1.92 6.48L4 29l7.72-1.87A11.94 11.94 0 0016.004 27C22.635 27 28 21.627 28 15S22.635 3 16.004 3zm0 21.75c-1.98 0-3.83-.55-5.41-1.5l-.39-.23-4.58 1.11 1.13-4.46-.25-.4A9.72 9.72 0 016.25 15c0-5.38 4.38-9.75 9.75-9.75S25.75 9.62 25.75 15 21.38 24.75 16.004 24.75zm5.4-7.3c-.3-.15-1.75-.86-2.02-.96-.27-.1-.47-.15-.66.15-.2.3-.76.96-.93 1.16-.17.2-.34.22-.63.07-.3-.15-1.24-.46-2.36-1.46-.87-.78-1.46-1.73-1.63-2.03-.17-.3-.02-.46.13-.6.13-.13.3-.34.45-.5.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.66-1.6-.9-2.2-.24-.58-.48-.5-.66-.5h-.56c-.2 0-.52.07-.79.37-.27.3-1.04 1.02-1.04 2.47 0 1.46 1.07 2.87 1.22 3.07.15.2 2.1 3.2 5.09 4.49.71.3 1.27.49 1.7.62.71.23 1.36.2 1.87.12.57-.08 1.75-.71 2-1.4.25-.68.25-1.27.17-1.4-.08-.13-.27-.2-.57-.35z"/>
        </svg>
        طلب عبر واتساب
      </a>
    </div>
  `;
  return card;
}

/* ============ حماية بسيطة من HTML injection ============ */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? "";
  return div.innerHTML;
}

/* ============ البحث الفوري مع تأخير بسيط (debounce) ============ */
let debounceTimer;
searchInput.addEventListener('input', (e) => {
  clearTimeout(debounceTimer);
  const value = e.target.value;
  debounceTimer = setTimeout(() => {
    searchQuery = value;
    applyFilters();
  }, 200);
});

/* ============ بحث داخل التصنيفات ============ */
categorySearch.addEventListener('input', (e) => {
  renderCategories(e.target.value);
});

/* ============ زر تحميل المزيد ============ */
loadMoreBtn.addEventListener('click', () => {
  loadingSpinner.classList.remove('hidden');
  loadMoreBtn.classList.add('hidden');
  setTimeout(() => {
    renderNextBatch();
    loadingSpinner.classList.add('hidden');
  }, 150);
});

/* ============ إزالة التصنيف النشط ============ */
clearCategoryBtn.addEventListener('click', () => selectCategory(null));

/* ============ فتح/إغلاق القائمة الجانبية (موبايل) ============ */
function openSidebar() {
  sidebar.classList.remove('translate-x-full');
  sidebarOverlay.classList.remove('hidden');
}
function closeSidebar() {
  if (window.innerWidth < 1024) {
    sidebar.classList.add('translate-x-full');
    sidebarOverlay.classList.add('hidden');
  }
}
openSidebarBtn.addEventListener('click', openSidebar);
closeSidebarBtn.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

/* ============ التشغيل الأولي: جلب الكتب من قاعدة البيانات ============ */
async function init() {
  grid.innerHTML = `
    <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-400">
      <div class="spinner mb-3"></div>
      <p class="text-sm">جاري تحميل الكتب...</p>
    </div>`;

  try {
    const snapshot = await getDocs(collection(db, 'books'));
    const loaded = [];
    snapshot.forEach(docSnap => loaded.push({ docId: docSnap.id, ...docSnap.data() }));
    loaded.sort((a, b) => (a.id || 0) - (b.id || 0));
    loaded.forEach(b => { b.topic = classifyTopic(b.title || ""); });
    BOOKS = loaded;

    CATEGORY_SETS = {
      topic: buildCategories('topic'),
      author: buildCategories('author'),
      publisher: buildCategories('publisher'),
    };

    renderCategories();
    applyFilters();
  } catch (err) {
    grid.innerHTML = `
      <div class="col-span-full flex flex-col items-center justify-center py-20 text-red-400 text-center px-4">
        <p class="font-bold mb-1">تعذّر تحميل الكتب</p>
        <p class="text-sm text-slate-400">تأكد من اتصالك بالإنترنت ثم أعد تحميل الصفحة</p>
      </div>`;
    console.error(err);
  }
}
init();
</script>
</body>
</html>
